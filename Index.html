<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aman Manager Pro - Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <header>
            <h1>Aman Manager Pro</h1>
            <div id="status-bar">الحالة: جاهز للتعديل</div>
        </header>

        <main>
            <div class="action-cards">
                <div class="card" onclick="document.getElementById('file-input').click()">
                    <span class="icon">📂</span>
                    <h3>فتح APK</h3>
                    <input type="file" id="file-input" accept=".apk" style="display:none;">
                </div>
                <div class="card" id="btn-list-apps">
                    <span class="icon">📱</span>
                    <h3>التطبيقات</h3>
                </div>
            </div>

            <section id="results-area">
                <div id="apps-list-view" class="view-panel" style="display:none;">
                    <h3>تطبيقات النظام</h3>
                    <div id="installed-apps-content"></div>
                </div>
                <div id="file-explorer-view" class="view-panel" style="display:none;">
                    <h3>الملفات المستخرجة</h3>
                    <ul id="files-list-content"></ul>
                </div>
            </section>
        </main>

        <div id="code-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <span class="close-btn">&times;</span>
                    <h4 id="modal-filename">اسم الملف</h4>
                    <button id="save-btn">حفظ التعديل ✅</button>
                </div>
                <textarea id="code-editor" spellcheck="false"></textarea>
            </div>
        </div>

        <nav class="tab-bar">
            <button class="tab-btn active">الرئيسية</button>
            <button class="tab-btn" onclick="alert('سيتم إضافة أدوات التوقيع لاحقاً')">توقيع APK</button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
