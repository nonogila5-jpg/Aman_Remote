<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aman Manager Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="logo">AMAN</h1>
            <p id="status-text">بانتظار تهيئة النظام...</p>
        </header>

        <main>
            <div class="stats-bar">
                <div class="stat-item">الحالة: <span id="connection-status">جاهز</span></div>
            </div>

            <div class="grid-buttons">
                <button id="btn-list-apps" class="action-card">
                    <span class="icon">📱</span>
                    <span class="label">استخراج التطبيقات</span>
                </button>
                <button class="action-card">
                    <span class="icon">📂</span>
                    <span class="label">فتح APK</span>
                </button>
            </div>
            
            <div id="app-list-container" class="list-container">
                </div>
        </main>
    </div>

    <script src="cordova.js"></script>
    <script src="script.js"></script>
</body>
</html>
